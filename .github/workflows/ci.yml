name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        working-directory: easywork
        run: mvn test -pl . -Dspring.profiles.active=test
        env:
          APP_JWT_SECRET: ci-test-jwt-secret-key-minimum-32-chars

      - name: Run integration tests
        working-directory: easywork
        run: mvn test -pl . -Dtest="*IntegrationTest" -Dspring.profiles.active=integration-test
        env:
          APP_JWT_SECRET: ci-test-jwt-secret-key-minimum-32-chars

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        working-directory: easywork
        run: mvn package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: easywork
          push: true
          tags: ghcr.io/${{ github.repository }}/workorder-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: easywork-admin/package-lock.json

      - name: Install and build admin app
        working-directory: easywork-admin
        run: |
          npm ci
          npm run build

  frontend-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: easywork-worker/package-lock.json

      - name: Install and build worker app
        working-directory: easywork-worker
        run: |
          npm ci
          npm run build
