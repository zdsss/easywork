spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:

  flyway:
    enabled: false  # H2 does not support PostgreSQL-specific Flyway migrations

  h2:
    console:
      enabled: false

  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    secret: test-jwt-secret-key-for-unit-tests-only-32chars
    expiration: 3600000

  security:
    allowed-origins: http://localhost:5173,http://localhost:5174
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    max-age: 3600

  workorder:
    force-start-before-report:
      PRODUCTION: false
      INSPECTION: false
      TRANSPORT: false
      ANDON: false

  mes:
    integration:
      enabled: false
      base-url: http://localhost:9999
      api-key: ""

logging:
  level:
    root: WARN
    com.xiaobai.workorder: DEBUG
