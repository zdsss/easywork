spring:
  application:
    name: xiaobai-workorder

  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate: marks existing databases (where V1.x scripts were manually applied)
    # as already at baseline-version so Flyway won't try to re-run historical migrations.
    # New deployments will run all migrations from V1.0 onward automatically.
    baseline-on-migrate: true
    baseline-version: 1.6
    out-of-order: false
    validate-on-migrate: true

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/workorder_db
    username: workorder_user
    password: workorder_pass
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

logging:
  level:
    root: INFO
    com.xiaobai.workorder: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/workorder.log
    max-size: 10MB
    max-history: 30

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

app:
  jwt:
    # No default value: must set APP_JWT_SECRET environment variable.
    # Omitting the default intentionally so the application fails fast
    # if the secret is not configured, rather than running with a weak key.
    secret: ${APP_JWT_SECRET}
    expiration: 86400000
    refresh-expiration: 604800000

  security:
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allowed-headers: "*"
    max-age: 3600
    rate-limit:
      login-max-requests: 10
      login-window-seconds: 60

  # Work order behavior: per-type force-start-before-report flag.
  # When true for a given order type, workers must call startWork before reportWork.
  # ANDON orders are typically processed without an explicit start step.
  workorder:
    force-start-before-report:
      PRODUCTION: false
      INSPECTION: false
      TRANSPORT: false
      ANDON: false

  # MES Integration
  # Set enabled=true and configure base-url to activate outbound push and retry scheduler.
  mes:
    integration:
      enabled: false
      base-url: http://mes-system:8090
      api-key: ""
      connect-timeout-ms: 5000
      read-timeout-ms: 10000
      retry-delay-ms: 300000   # max delay between retries (ms)
      max-retries: 5            # maximum number of retry attempts before permanent failure
      initial-delay-ms: 5000   # initial backoff delay (ms) for the first retry
      backoff-multiplier: 2.0  # exponential multiplier applied per attempt
